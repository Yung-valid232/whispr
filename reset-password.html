<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Whispr</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page-center">
  <div class="card">
    <a href="index.html" class="brand" style="display:inline-block;margin-bottom:28px;">Whispr<span class="brand-dot">.</span></a>
    <h2 style="font-size:1.5rem;margin-bottom:6px;">Set new password</h2>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:28px;">Choose a strong password for your account.</p>

    <div class="alert alert-error" id="errMsg"></div>
    <div class="alert alert-success" id="okMsg"></div>

    <div id="resetForm">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters"/>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password"/>
      </div>
      <button class="btn btn-primary" id="saveBtn" onclick="doSave()">Save New Password</button>
    </div>

    <div id="successSection" style="display:none;text-align:center;">
      <div style="font-size:2.5rem;margin-bottom:16px;">🎉</div>
      <p style="margin-bottom:20px;color:var(--muted);">Password updated successfully!</p>
      <a href="login.html"><button class="btn btn-primary">Log In Now</button></a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase.js"></script>
<script>
  // Handle the reset token from URL
  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      // User is now authenticated via the reset link — ready to set new password
      console.log('Password recovery mode active');
    }
  });

  async function doSave() {
    const btn = document.getElementById('saveBtn');
    const errEl = document.getElementById('errMsg');
    const okEl = document.getElementById('okMsg');
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    errEl.classList.remove('show');
    okEl.classList.remove('show');

    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.classList.add('show');
      return;
    }

    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving...';

    const { error } = await db.auth.updateUser({ password });

    if (error) {
      errEl.textContent = error.message;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Save New Password';
    } else {
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('successSection').style.display = 'block';
      await db.auth.signOut();
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doSave(); });
</script>
</body>
</html>

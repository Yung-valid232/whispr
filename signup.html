<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Whispr</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page-center">
  <div class="card">
    <a href="/" class="brand" style="display:inline-block;margin-bottom:28px;">Whispr<span class="brand-dot">.</span></a>
    <h2 style="font-size:1.5rem;margin-bottom:6px;">Create your account</h2>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:28px;">Get your anonymous link in seconds.</p>

    <div class="alert alert-error" id="errorMsg"></div>
    <div class="alert alert-success" id="successMsg"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="e.g. john_doe" autocomplete="off"/>
      <div style="font-size:0.72rem;color:var(--muted);margin-top:5px;">3–20 chars · lowercase, numbers, underscores</div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters"/>
    </div>

    <button class="btn btn-primary" id="signupBtn" onclick="doSignup()">Create Account</button>

    <div class="divider">or</div>
    <p style="text-align:center;font-size:0.85rem;color:var(--muted);">
      Already have an account? <a href="/login">Log in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const redirectTo = params.get('redirect') || '/dashboard';

  async function doSignup() {
    const btn = document.getElementById('signupBtn');
    const errEl = document.getElementById('errorMsg');
    const okEl = document.getElementById('successMsg');
    const username = document.getElementById('username').value.trim().toLowerCase();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errEl.classList.remove('show');
    okEl.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating...';

    try {
      await handleSignup(email, password, username);
      okEl.innerHTML = '✓ Account created! Check your email to confirm, then log in.<br><br>📬 <span style="font-size:0.8rem;opacity:0.8;">Can\'t find it? Check your spam folder.</span>';
      okEl.classList.add('show');
      setTimeout(() => window.location.href = '/login?redirect=' + encodeURIComponent(redirectTo), 4000);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — Whispr</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page-center">
  <div class="card">
    <a href="/" class="brand" style="display:inline-block;margin-bottom:28px;">Whispr<span class="brand-dot">.</span></a>
    <h2 style="font-size:1.5rem;margin-bottom:6px;">Welcome back</h2>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:28px;">Log in to read your messages.</p>

    <div class="alert alert-error" id="errorMsg"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password"/>
      <div style="text-align:right;margin-top:6px;">
        <a href="/forgot-password" style="font-size:0.78rem;color:var(--muted);">Forgot password?</a>
      </div>
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Log In</button>

    <div class="divider">or</div>
    <p style="text-align:center;font-size:0.85rem;color:var(--muted);">
      No account? <a href="/signup">Sign up free</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  // Get redirect URL if coming from user page
  const params = new URLSearchParams(location.search);
  const redirectTo = params.get('redirect') || '/dashboard';

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('errorMsg');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errEl.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Logging in...';

    try {
      await handleLogin(email, password);
      window.location.href = redirectTo;
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
